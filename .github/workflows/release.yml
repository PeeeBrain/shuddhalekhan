name: Release Windows App

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  release:
    runs-on: blacksmith-4vcpu-windows-2025
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Verify release tag and changelog
        shell: pwsh
        run: |
          $version = (Get-Content package.json | ConvertFrom-Json).version
          $expectedTag = "v$version"
          if ($env:GITHUB_REF_NAME -ne $expectedTag) {
            throw "Release tag $env:GITHUB_REF_NAME does not match package.json version $version."
          }

          if (-not (Select-String -Path CHANGELOG.md -Pattern "^## $([regex]::Escape($expectedTag))(?:\s|$)" -Quiet)) {
            throw "CHANGELOG.md does not contain a section for $expectedTag."
          }

      - name: Typecheck
        run: bun run typecheck

      - name: Lint
        run: bun run lint

      - name: Test
        run: bun test

      - name: Build
        run: bun run build

      - name: Package and publish Electron app
        run: bun run dist -- --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Update GitHub release notes
        shell: pwsh
        run: |
          $version = (Get-Content package.json | ConvertFrom-Json).version
          $tag = "v$version"
          $notesFile = Join-Path $env:RUNNER_TEMP 'release-notes.md'
          bun scripts/extract-release-notes.ts $version | Set-Content -Path $notesFile -NoNewline
          gh release edit $tag --title "Shuddhalekhan $version" --notes-file $notesFile
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
