name: Release Windows App

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  release:
    runs-on: blacksmith-4vcpu-windows-2025
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Derive application version from release tag
        id: release_version
        shell: pwsh
        run: |
          $tag = $env:GITHUB_REF_NAME
          if ($tag -notmatch '^v(\d+\.\d+\.\d+)$') {
            throw "Invalid semantic version release tag: $tag"
          }

          $version = $Matches[1]
          bun pm pkg set "version=$version"

          "tag=$tag" >> $env:GITHUB_OUTPUT
          "version=$version" >> $env:GITHUB_OUTPUT
          Write-Host "Building Shuddhalekhan $version from tag $tag."

      - name: Typecheck
        run: bun run typecheck

      - name: Lint
        run: bun run lint

      - name: Test
        run: bun test

      - name: Build
        run: bun run build

      - name: Generate release notes from Git history
        shell: pwsh
        run: |
          $tag = '${{ steps.release_version.outputs.tag }}'
          $notesFile = Join-Path $env:RUNNER_TEMP 'release-notes.md'
          $previousTag = git tag --merged "$tag^" --sort=-version:refname |
            Where-Object { $_ -match '^v\d+\.\d+\.\d+$' } |
            Select-Object -First 1

          $noteArgs = @(
            '--method', 'POST',
            "repos/$env:GITHUB_REPOSITORY/releases/generate-notes",
            '-f', "tag_name=$tag"
          )
          if ($previousTag) {
            $noteArgs += @('-f', "previous_tag_name=$previousTag")
            Write-Host "Generating release notes from $previousTag to $tag."
          } else {
            Write-Host "No previous stable release tag found; generating initial release notes."
          }

          gh api @noteArgs --jq '.body' |
            Set-Content -Path $notesFile -Encoding utf8
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Package and publish Electron app
        run: bun run dist -- --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Finalize GitHub release metadata
        shell: pwsh
        run: |
          $tag = '${{ steps.release_version.outputs.tag }}'
          $version = '${{ steps.release_version.outputs.version }}'
          $notesFile = Join-Path $env:RUNNER_TEMP 'release-notes.md'
          gh release edit $tag `
            --title "Shuddhalekhan $version" `
            --notes-file $notesFile `
            --draft=false
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
