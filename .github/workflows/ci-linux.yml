# Required repository variables:
# - BLACKSMITH_WINDOWS_RUNNER for CI Windows
# - BLACKSMITH_LINUX_RUNNER for CI Linux
# - BLACKSMITH_MACOS_RUNNER for CI macOS

name: CI Linux

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-linux-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  checks:
    name: Linux typecheck, lint, and test
    runs-on: ${{ vars.BLACKSMITH_LINUX_RUNNER }}
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun run typecheck

      - name: Lint
        run: bun run lint

      - name: Test
        run: bun test
