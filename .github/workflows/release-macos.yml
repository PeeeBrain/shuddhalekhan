name: Release macOS App

on:
  workflow_run:
    workflows: [CI macOS]
    types: [completed]
    branches: [main]
  workflow_dispatch:

jobs:
  release-macos:
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    runs-on: ${{ vars.BLACKSMITH_MACOS_RUNNER }}
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build
        run: bun run build

      - name: Package macOS unsigned artifacts
        run: bun x electron-builder --mac --publish never

      - name: Publish macOS assets
        shell: pwsh
        run: .github/scripts/publish-platform-release.ps1 -Platform macos
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
